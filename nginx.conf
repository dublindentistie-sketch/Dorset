server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # 最大上传文件大小
    client_max_body_size 20M;

    # 静态文件目录
    location /static/ {
        alias /var/www/dental-clinic/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件目录
    location /media/ {
        alias /var/www/dental-clinic/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 代理到 Gunicorn
    location / {
        proxy_pass http://unix:/var/www/dental-clinic/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    gzip_min_length 1000;

    # 访问日志和错误日志
    access_log /var/log/nginx/dental-clinic-access.log;
    error_log /var/log/nginx/dental-clinic-error.log;
}
